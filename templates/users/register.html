<!-- templates/main/register.html -->
{% extends 'main/base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md mx-auto">
        <div class="text-center">
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Регистрация</h2>
            <p class="text-gray-600">Создайте аккаунт для удобных покупок</p>
        </div>

        <div class="mt-8 bg-white py-8 px-6 shadow rounded-lg">
            <!-- Прямо над формой -->
            <div id="register-feedback" class="mt-3" style="display: none;">
                <div id="feedback-text" class="alert"></div>
            </div>
            <form method="post" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                    {{ form.email }}
                    {% if form.email.errors %}
                    <div class="mt-1 text-sm text-red-600">
                        {{ form.email.errors }}
                    </div>
                    {% endif %}
                </div>

                <button type="submit"
                        class="w-full bg-black text-white py-3 px-4 rounded-md hover:bg-gray-800 transition duration-200">
                    Продолжить
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    Уже есть аккаунт?
                    <a href="{% url 'login' %}" class="font-medium text-black hover:underline">Войдите</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registration-form').addEventListener('submit', function(e) {
        // Если мы хотим обрабатывать асинхронно, раскомментируй e.preventDefault()
        // e.preventDefault();

        const feedback = document.getElementById('register-feedback');
        const text = document.getElementById('feedback-text');
        const formData = new FormData(this);

        feedback.style.display = 'block';
        text.className = 'alert alert-info';
        text.innerText = 'Обработка запроса...';

        fetch(window.location.href, {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': formData.get('csrfmiddlewaretoken')
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                text.className = 'alert alert-success';
                // Можно очистить форму после успеха
                document.getElementById('registration-form').reset();
            } else {
                text.className = 'alert alert-danger';
            }
            text.innerText = data.message;
        })
        .catch(err => {
            text.className = 'alert alert-danger';
            text.innerText = 'Произошла системная ошибка. Проверьте соединение.';
        });
    });
</script>
{% endblock %}
