{%load static%}

<!DOCTYPE html>
<html>
<head>
    <title>Оплата...</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'images/freeom_favicon.svg' %}">

</head>
<body>
<div style="max-width: 450px; margin: 80px auto; border: 1px solid #e0e0e0; padding: 30px; border-radius: 12px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: #004a99; margin: 0;">Freedom <span style="color: #000;">Pay</span></h2>
        <span style="background: #f0f0f0; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold;">TEST MODE</span>
    </div>

    <div style="margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
        <p style="color: #666; margin: 5px 0;">Заказ №: <strong>{{ pg_order_id }}</strong></p>
        <p style="color: #666; margin: 5px 0;">К оплате: <strong style="font-size: 20px; color: #000;">{{ pg_amount }} тг.</strong></p>
        <p style="font-size: 13px; color: #999;">{{ pg_description }}</p>
    </div>

    <div style="margin-bottom: 20px;">
        <input type="text" placeholder="Номер карты" value="4444 4444 4444 4444" disabled style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 10px; background: #fafafa;">
        <div style="display: flex; gap: 10px;">
            <input type="text" placeholder="ММ/ГГ" value="12/26" disabled style="width: 50%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; background: #fafafa;">
            <input type="text" placeholder="CVV" value="123" disabled style="width: 50%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; background: #fafafa;">
        </div>
    </div>

    <!-- Кнопка, которая ведет на твой реальный payment_success_view -->

    {% csrf_token %}
    <input type="hidden" name="pg_order_id" value="{{ pg_order_id }}">
    <button type="submit" style="width: 100%; background: #004a99; color: #fff; padding: 16px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer;">
        ОПЛАТИТЬ {{ pg_amount }} тг.
    </button>
</form>-->
    <!--Post не работает на мобилках -->
<a href="{% url 'payment_success' order.id %}"
   style="display: block; text-decoration: none; text-align: center; background: #004a99; color: #fff; padding: 16px; border-radius: 8px; font-weight: bold;">
    ОПЛАТИТЬ {{ order.total_amount }} тг.
</a>


    <p style="text-align: center; font-size: 12px; color: #aaa; margin-top: 15px;">Это демонстрационная страница оплаты</p>
</div>
