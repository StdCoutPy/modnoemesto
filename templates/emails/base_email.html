<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Modnoe Mesto{% endblock %}</title>
    <style>
        /* CSS стили из предыдущего шага */
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .email-container { max-width: 600px; margin: 0 auto; background: white; }
        .email-header { background: #000; color: white; padding: 20px; text-align: center; }
        .email-content { padding: 30px; }
        .btn { background: #000; color: white; padding: 12px 25px; text-decoration: none; }
        .footer { background: #f5f5f5; padding: 15px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="email-header">
            <h1>MODNOE MESTO</h1>
        </div>

        <div class="email-content">
            {% block content %}{% endblock %}
        </div>

        <div class="footer">
            <p>&copy; 2025 Modnoe Mesto. Все права защищены.</p>
            <p>г. Москва, ул. Примерная, д. 1</p>
            <p>Телефон: +7 (495) 123-45-67</p>
            <p><a href="https://modnoemesto.ru" style="color: #666;">modnoemesto.ru</a></p>
        </div>
    </div>
</body>
</html>
