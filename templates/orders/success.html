{% extends 'main/base.html' %}
{%load static%}
{% block content %}
<div class="max-w-2xl mx-auto mt-20 text-center p-8 bg-white shadow-lg rounded-xl border border-gray-100">
    <div class="mb-6 flex justify-center">
        <div class="bg-green-100 p-4 rounded-full">
            <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
    </div>
    
    <h1 class="text-3xl font-bold text-gray-900 mb-4">Заказ успешно оплачен!</h1>
    <p class="text-gray-600 mb-8">Номер вашего заказа: <span class="font-bold text-black">#{{ order.id }}</span>. Подтверждение и детали заказа отправлены вам на Email.</p>
    
    <div class="bg-gray-50 rounded-lg p-6 mb-8 text-left">
        <h3 class="font-bold mb-3">Детали доставки:</h3>
        <p class="text-sm">Город: {{ order.city }}</p>
        <p class="text-sm">Адрес: {{ order.address }}</p>
    </div>

    <a href="/" class="inline-block bg-black text-white px-8 py-3 rounded-md font-bold hover:bg-gray-800 transition">
        Вернуться в магазин
    </a>
</div>
{% endblock %}
