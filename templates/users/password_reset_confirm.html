<!-- templates/main/login.html -->
{% extends 'main/base.html' %}
{% load static %}


<h2>Введите новый пароль</h2>
<div class="mt-8 bg-white py-8 px-6 shadow rounded-lg">
<form method="post" class="space-y-6">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="w-full bg-black text-white py-3 px-4 rounded-md hover:bg-gray-800 transition duration-200">
        Сохранить пароль
    </button>
</form>
</div>
